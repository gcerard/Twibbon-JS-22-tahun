<!DOCTYPE html>
<html lang="en">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twibbon 22 Tahun JEMARI Sakato</title>

    <link href="https://fonts.cdnfonts.com/css/google-sans" rel="stylesheet">

    <style>
     
        body {
            /* Add the font-family rule here */
            font-family: 'Product Sans', 'Google Sans', sans-serif;
            
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffffff;
            margin: 0;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
        }
        .btn {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin: 5px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
        canvas {
            border: 1px solid #ccc;
            width: 360px;  
            height: 450px; 
            touch-action: none; /* Prevents whole-page scrolling on mobile */
        }
        .credit {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Twibbon 22 Tahun JEMARI Sakato</h2>
        <input type="file" id="fileInput" accept="image/*">
        <br><br>
        
        <canvas id="canvas" width="1080" height="1350" style="display: none;"></canvas>
        <canvas id="displayCanvas" width="360" height="450"></canvas>
        <br><br>
        
        <button class="btn" onclick="downloadImage()">Download / Save Image</button>
        <div class="credit">
            Made with <a href="https://www.instagram.com/affifasy" target="_blank">Love <3</a>
        </div>
    </div>

    <script>
        let img = new Image();
        let frameImg = new Image();
        frameImg.src = 'Twibbon 22.png'; // Update with your actual frame image path
        let displayCanvas, displayCtx, canvas, ctx;
        let isDragging = false;
        let startX, startY;
        let imgX = 0, imgY = 0;
        let imgScale = 1;
        let initialDistance = 0;

        // Initialize variables on load
        window.onload = function() {
            canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            displayCanvas = document.getElementById('displayCanvas');
            displayCtx = displayCanvas.getContext('2d');
            
            const fileInput = document.getElementById('fileInput');
            
            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        img.onload = function() {
                            // Reset scale and position for new image
                            imgScale = canvas.width / img.width; 
                            imgX = 0;
                            imgY = (canvas.height - (img.height * imgScale)) / 2; // Center vertically
                            drawImage();
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Mouse Events (Desktop)
            displayCanvas.addEventListener('mousedown', startDragging);
            displayCanvas.addEventListener('mousemove', dragImage);
            displayCanvas.addEventListener('mouseup', stopDragging);
            displayCanvas.addEventListener('mouseout', stopDragging);
            displayCanvas.addEventListener('wheel', resizeImage, { passive: false });

            // Touch Events (Mobile)
            displayCanvas.addEventListener('touchstart', startDragging, { passive: false });
            displayCanvas.addEventListener('touchmove', handleTouchMove, { passive: false });
            displayCanvas.addEventListener('touchend', stopDragging);
        }

        function drawImage() {
            const scale = displayCanvas.width / canvas.width;

            // Draw Full-Res Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, imgX, imgY, img.width * imgScale, img.height * imgScale);
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

            // Draw Display Canvas (Preview)
            displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
            displayCtx.drawImage(canvas, 0, 0, canvas.width * scale, canvas.height * scale);
        }

        function getOffset(event) {
            const rect = displayCanvas.getBoundingClientRect();
            if (event.touches) {
                return {
                    x: event.touches[0].clientX - rect.left,
                    y: event.touches[0].clientY - rect.top
                };
            }
            return {
                x: event.clientX - rect.left,
                y: event.clientY - rect.top
            };
        }

        function startDragging(event) {
            const scale = canvas.width / displayCanvas.width;
            isDragging = true;
            
            if (event.touches && event.touches.length === 2) {
                // Initialize pinch distance
                initialDistance = getDistance(event.touches);
            } else {
                // Single finger/mouse drag
                const offset = getOffset(event);
                startX = offset.x * scale - imgX;
                startY = offset.y * scale - imgY;
            }
            event.preventDefault(); 
        }

        function handleTouchMove(event) {
            if (event.touches.length === 2) {
                handlePinch(event);
            } else {
                dragImage(event);
            }
        }

        function dragImage(event) {
            if (isDragging && (!event.touches || event.touches.length === 1)) {
                const scale = canvas.width / displayCanvas.width;
                const offset = getOffset(event);
                imgX = offset.x * scale - startX;
                imgY = offset.y * scale - startY;
                drawImage();
                event.preventDefault(); 
            }
        }

        function stopDragging() {
            isDragging = false;
        }

        function resizeImage(event) {
            const scaleFactor = event.deltaY < 0 ? 1.05 : 0.95;
            applyZoom(scaleFactor, displayCanvas.width / 2, displayCanvas.height / 2);
            event.preventDefault();
        }

        function handlePinch(event) {
            const currentDistance = getDistance(event.touches);
            if (initialDistance > 0) {
                const scaleChange = currentDistance / initialDistance;
                
                // Find the center of the two fingers (midpoint)
                const rect = displayCanvas.getBoundingClientRect();
                const centerX = ((event.touches[0].clientX + event.touches[1].clientX) / 2) - rect.left;
                const centerY = ((event.touches[0].clientY + event.touches[1].clientY) / 2) - rect.top;

                applyZoom(scaleChange, centerX, centerY);
                initialDistance = currentDistance;
            }
            event.preventDefault();
        }

        function applyZoom(scaleChange, centerX, centerY) {
            // Convert display coordinates to actual canvas coordinates
            const scaleCanvas = canvas.width / displayCanvas.width;
            const canvasCenterX = centerX * scaleCanvas;
            const canvasCenterY = centerY * scaleCanvas;

            // Adjust position so it scales around the center of the fingers
            imgX = canvasCenterX - (canvasCenterX - imgX) * scaleChange;
            imgY = canvasCenterY - (canvasCenterY - imgY) * scaleChange;
            
            imgScale *= scaleChange;
            drawImage();
        }

        function getDistance(touches) {
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Helper function to sync convert Data URL to a File object for Safari
        function dataURLtoFile(dataurl, filename) {
            let arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
                bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type:mime});
        }

        function downloadImage() {
            // Check if an image is actually loaded
            if (imgScale === 1 && imgX === 0 && imgY === 0) {
                alert("Please upload an image first.");
                return;
            }

            const dataUrl = canvas.toDataURL('image/png');
            const fileName = 'Twibbon-Jemari.png';

            // Check if on a mobile device and Web Share API is available (Safari/iOS Native fix)
            if (navigator.share && /iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                try {
                    const file = dataURLtoFile(dataUrl, fileName);
                    navigator.share({
                        files: [file],
                        title: 'Twibbon JEMARI',
                    }).catch((error) => console.log('Sharing aborted', error));
                } catch (e) {
                    console.error("Share failed", e);
                }
            } else {
                // Fallback for Desktop Chrome/Firefox/Edge
                const link = document.createElement('a');
                link.download = fileName;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
